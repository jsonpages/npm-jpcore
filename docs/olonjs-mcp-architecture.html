<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlonJS MCP Architecture</title>
  <style>
    body {
      margin: 0;
      background: #11111b;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" width="800" height="1000" font-family="'Courier New', Courier, monospace">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#cdd6f4"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#a6e3a1"/>
    </marker>
    <marker id="arrow-red" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#f38ba8"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="1000" fill="#1e1e2e"/>

  <!-- BLOCK 1: CURSOR -->
  <rect x="30" y="30" width="740" height="170" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="1.5"/>
  <text x="400" y="55" fill="#89b4fa" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1">CURSOR (IDE)</text>

  <rect x="100" y="68" width="600" height="36" rx="5" fill="#1e1e2e" stroke="#6c7086" stroke-width="1"/>
  <text x="400" y="90" fill="#cdd6f4" font-size="11.5" text-anchor="middle">You write: "navigate to chi-sono" / "update this section"</text>

  <line x1="400" y1="104" x2="400" y2="122" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <rect x="280" y="122" width="240" height="34" rx="5" fill="#1e1e2e" stroke="#6c7086" stroke-width="1"/>
  <text x="400" y="143" fill="#cdd6f4" font-size="12" text-anchor="middle">AI Agent</text>

  <!-- Arrow CURSOR to MCP -->
  <line x1="400" y1="200" x2="400" y2="235" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="213" fill="#89b4fa" font-size="10">MCP protocol</text>
  <text x="430" y="227" fill="#6c7086" font-size="10">JSON-RPC over STDIO</text>

  <!-- BLOCK 2: MCP SERVER -->
  <rect x="30" y="240" width="740" height="330" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="1.5"/>
  <text x="400" y="262" fill="#a6e3a1" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1">@olonjs/mcp &#x2014; Node.js process</text>
  <text x="400" y="278" fill="#6c7086" font-size="10.5" text-anchor="middle">node dist/cli.js https://olonjs.io</text>

  <!-- Inner LEFT: OlonJsMcpServer -->
  <rect x="50" y="288" width="310" height="264" rx="6" fill="#1e1e2e" stroke="#89dceb" stroke-width="1.2"/>
  <text x="205" y="308" fill="#89dceb" font-size="11" font-weight="bold" text-anchor="middle">OlonJsMcpServer &#xB7; server.ts</text>

  <text x="66" y="338" fill="#cdd6f4" font-size="10.5">ListTools</text>
  <line x1="192" y1="334" x2="352" y2="334" stroke="#cdd6f4" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="66" y="378" fill="#cdd6f4" font-size="10.5">CallTool:</text>
  <text x="66" y="393" fill="#f9e2af" font-size="10.5">  navigate-to-page</text>
  <text x="66" y="408" fill="#6c7086" font-size="10">  (server-side only)</text>
  <line x1="192" y1="393" x2="352" y2="393" stroke="#f9e2af" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="66" y="443" fill="#cdd6f4" font-size="10.5">CallTool:</text>
  <text x="66" y="458" fill="#cba6f7" font-size="10.5">  update-section</text>
  <text x="66" y="473" fill="#6c7086" font-size="10">  (web-side)</text>
  <line x1="192" y1="458" x2="352" y2="458" stroke="#cba6f7" stroke-width="1.2" marker-end="url(#arrow)"/>

  <text x="66" y="508" fill="#cdd6f4" font-size="10.5">ReadResource:</text>
  <text x="66" y="523" fill="#94e2d5" font-size="10.5">  olon://pages/home</text>
  <line x1="192" y1="518" x2="352" y2="518" stroke="#94e2d5" stroke-width="1.2" marker-end="url(#arrow)"/>

  <!-- Inner RIGHT: PlaywrightBridge -->
  <rect x="370" y="288" width="380" height="264" rx="6" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1.2"/>
  <text x="560" y="308" fill="#cba6f7" font-size="11" font-weight="bold" text-anchor="middle">PlaywrightBridge &#xB7; bridge.ts</text>

  <text x="386" y="329" fill="#cdd6f4" font-size="10">listTools()</text>
  <text x="386" y="341" fill="#6c7086" font-size="10">page.evaluate(listTools)</text>

  <text x="386" y="380" fill="#f9e2af" font-size="10">navigateTo(slug)</text>
  <text x="386" y="392" fill="#6c7086" font-size="10">page.goto(/admin/slug)</text>
  <text x="386" y="404" fill="#6c7086" font-size="10">waitFor(WebMCP ready)</text>

  <text x="386" y="445" fill="#cba6f7" font-size="10">executeTool(name, args)</text>
  <text x="386" y="457" fill="#6c7086" font-size="10">page.evaluate(executeTool)</text>

  <text x="386" y="510" fill="#94e2d5" font-size="10">readResource(uri)</text>
  <text x="386" y="522" fill="#6c7086" font-size="10">page.evaluate(readResource)</text>

  <!-- Arrow MCP to SITE -->
  <line x1="400" y1="570" x2="400" y2="608" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="430" y="591" fill="#6c7086" font-size="10">Playwright &#xB7; Chromium headless</text>

  <!-- BLOCK 3: OlonJS SITE -->
  <rect x="30" y="615" width="740" height="355" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="1.5"/>
  <text x="400" y="638" fill="#f38ba8" font-size="13" font-weight="bold" text-anchor="middle" letter-spacing="1">https://olonjs.io/admin &#x2014; any OlonJS site</text>

  <rect x="50" y="648" width="700" height="34" rx="5" fill="#1e1e2e" stroke="#6c7086" stroke-width="1"/>
  <text x="400" y="669" fill="#cdd6f4" font-size="11" text-anchor="middle">window.navigator.modelContextProtocol &#x2190; WebMCP injected in SPA</text>

  <text x="66" y="706" fill="#94e2d5" font-size="10.5">listTools()</text>
  <text x="180" y="706" fill="#6c7086" font-size="10.5">&#x2192;  [ "update-section", ... ]</text>

  <text x="66" y="728" fill="#cba6f7" font-size="10.5">executeTool()</text>
  <text x="190" y="728" fill="#6c7086" font-size="10.5">&#x2192;  persists to file, updates store</text>

  <text x="66" y="750" fill="#94e2d5" font-size="10.5">readResource()</text>
  <text x="200" y="750" fill="#6c7086" font-size="10.5">&#x2192;  reads current page JSON</text>

  <line x1="400" y1="758" x2="400" y2="790" stroke="#cdd6f4" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Diamond -->
  <polygon points="400,798 490,838 400,878 310,838" fill="#1e1e2e" stroke="#f9e2af" stroke-width="1.5"/>
  <text x="400" y="832" fill="#f9e2af" font-size="10" text-anchor="middle">Active slug</text>
  <text x="400" y="846" fill="#f9e2af" font-size="10" text-anchor="middle">=== slug in tool?</text>

  <!-- Match -->
  <line x1="490" y1="838" x2="580" y2="838" stroke="#a6e3a1" stroke-width="1.5" marker-end="url(#arrow-green)"/>
  <text x="533" y="828" fill="#a6e3a1" font-size="10" text-anchor="middle">&#x2705; match</text>
  <rect x="582" y="818" width="168" height="40" rx="5" fill="#1e1e2e" stroke="#a6e3a1" stroke-width="1.2"/>
  <text x="666" y="835" fill="#a6e3a1" font-size="10" text-anchor="middle">Section updated</text>
  <text x="666" y="849" fill="#a6e3a1" font-size="10" text-anchor="middle">&#x26; persisted &#x2713;</text>

  <!-- Mismatch -->
  <line x1="310" y1="838" x2="218" y2="838" stroke="#f38ba8" stroke-width="1.5" marker-end="url(#arrow-red)"/>
  <text x="262" y="828" fill="#f38ba8" font-size="10" text-anchor="middle">&#x274C; mismatch</text>
  <rect x="50" y="810" width="168" height="56" rx="5" fill="#1e1e2e" stroke="#f38ba8" stroke-width="1.2"/>
  <text x="134" y="830" fill="#f38ba8" font-size="10" text-anchor="middle">Error: slug mismatch</text>
  <text x="134" y="845" fill="#6c7086" font-size="10" text-anchor="middle">&#x2192; call navigate-to-page</text>
  <text x="134" y="860" fill="#6c7086" font-size="10" text-anchor="middle">first</text>

</svg>
</body>
</html>
