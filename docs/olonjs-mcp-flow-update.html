<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OlonJS MCP — Update Flow</title>
  <style>
    body {
      margin: 0;
      background: #11111b;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      padding: 40px 20px;
      min-height: 100vh;
    }
  </style>
</head>
<body>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 800" width="640" height="800" font-family="'Courier New', Courier, monospace">

  <!-- Background -->
  <rect width="640" height="800" fill="#1e1e2e"/>

  <!-- ─── STEP 1: CURSOR ─── -->
  <rect x="40" y="40" width="560" height="80" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
  <text x="320" y="68" fill="#89b4fa" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">CURSOR (IDE)</text>
  <text x="320" y="90" fill="#cdd6f4" font-size="12" text-anchor="middle">"update this section"</text>
  <text x="320" y="108" fill="#6c7086" font-size="10" text-anchor="middle">AI Agent calls update-section tool</text>

  <!-- Arrow 1 -->
  <line x1="320" y1="120" x2="320" y2="168" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="355" y="149" fill="#6c7086" font-size="10">JSON-RPC &#xB7; STDIO</text>

  <!-- ─── STEP 2: MCP SERVER ─── -->
  <rect x="40" y="170" width="560" height="110" rx="8" fill="#181825" stroke="#a6e3a1" stroke-width="2"/>
  <text x="320" y="196" fill="#a6e3a1" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">@olonjs/mcp &#x2014; Node.js process</text>

  <!-- OlonJsMcpServer pill -->
  <rect x="60" y="206" width="220" height="56" rx="5" fill="#1e1e2e" stroke="#89dceb" stroke-width="1"/>
  <text x="170" y="225" fill="#89dceb" font-size="10" font-weight="bold" text-anchor="middle">OlonJsMcpServer</text>
  <text x="170" y="241" fill="#89dceb" font-size="10" text-anchor="middle">server.ts</text>
  <text x="170" y="255" fill="#6c7086" font-size="9" text-anchor="middle">CallTool: update-section</text>

  <!-- Arrow between pills -->
  <line x1="280" y1="234" x2="358" y2="234" stroke="#6c7086" stroke-width="1.5" marker-end="url(#arr)"/>

  <!-- PlaywrightBridge pill -->
  <rect x="360" y="206" width="220" height="56" rx="5" fill="#1e1e2e" stroke="#cba6f7" stroke-width="1"/>
  <text x="470" y="225" fill="#cba6f7" font-size="10" font-weight="bold" text-anchor="middle">PlaywrightBridge</text>
  <text x="470" y="241" fill="#cba6f7" font-size="10" text-anchor="middle">bridge.ts</text>
  <text x="470" y="255" fill="#6c7086" font-size="9" text-anchor="middle">page.evaluate(executeTool)</text>

  <!-- Arrow 2 -->
  <line x1="320" y1="280" x2="320" y2="328" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="355" y="309" fill="#6c7086" font-size="10">Playwright &#xB7; Chromium headless</text>

  <!-- ─── STEP 3: OLONJS SITE ─── -->
  <rect x="40" y="330" width="560" height="100" rx="8" fill="#181825" stroke="#f38ba8" stroke-width="2"/>
  <text x="320" y="356" fill="#f38ba8" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">https://olonjs.io/admin</text>
  <text x="320" y="376" fill="#cdd6f4" font-size="11" text-anchor="middle">navigator.modelContextProtocol.executeTool()</text>

  <!-- Slug check inline -->
  <rect x="100" y="388" width="440" height="30" rx="4" fill="#1e1e2e" stroke="#f9e2af" stroke-width="1"/>
  <text x="320" y="408" fill="#f9e2af" font-size="10" text-anchor="middle">slug check: Active slug === "home" &#x2713; &#x2014; validation passed</text>

  <!-- Arrow 3 -->
  <line x1="320" y1="430" x2="320" y2="478" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="355" y="459" fill="#6c7086" font-size="10">writes to disk</text>

  <!-- ─── STEP 4: FILE SAVED ─── -->
  <rect x="40" y="480" width="560" height="80" rx="8" fill="#181825" stroke="#fab387" stroke-width="2"/>
  <text x="320" y="506" fill="#fab387" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">JSON FILE</text>
  <text x="320" y="526" fill="#cdd6f4" font-size="11" text-anchor="middle">public/pages/home.json</text>
  <text x="320" y="545" fill="#6c7086" font-size="10" text-anchor="middle">section data persisted &#x2713;</text>

  <!-- Arrow 4 -->
  <line x1="320" y1="560" x2="320" y2="608" stroke="#6c7086" stroke-width="1.5" stroke-dasharray="5,3" marker-end="url(#arr)"/>
  <text x="355" y="589" fill="#6c7086" font-size="10">&#x7B; ok: true &#x7D; response</text>

  <!-- ─── STEP 5: CURSOR RESPONSE ─── -->
  <rect x="40" y="610" width="560" height="70" rx="8" fill="#181825" stroke="#89b4fa" stroke-width="2"/>
  <text x="320" y="636" fill="#89b4fa" font-size="11" font-weight="bold" text-anchor="middle" letter-spacing="1">CURSOR (IDE)</text>
  <text x="320" y="658" fill="#a6e3a1" font-size="12" text-anchor="middle">&#x2705;  Section updated successfully</text>

  <!-- ─── LEGEND ─── -->
  <text x="320" y="714" fill="#45475a" font-size="9" text-anchor="middle">- - -  transport layer    &#x2014;&#x2014;  direct call    &#x25A1;  component</text>

  <!-- Marker -->
  <defs>
    <marker id="arr" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#64748b"/>
    </marker>
  </defs>

</svg>
</body>
</html>
